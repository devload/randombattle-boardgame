<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>RANDOMBATTLE — Lobby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./design-tokens.css">
<link rel="stylesheet" href="./embed.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }

  .lobby {
    position: absolute;
    inset: 0;
    padding: 60px 24px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  .lobby__logo {
    text-align: center;
    margin-top: 40px;
  }
  .lobby__logo__badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--cyan);
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .lobby__logo__title {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 0.95;
    background: linear-gradient(180deg, var(--cyan) 0%, var(--magenta) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
  }
  .lobby__logo__sub {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .lobby__logo__version {
    display: inline-block;
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--magenta);
    border: 1px solid var(--magenta);
    padding: 2px 8px;
    letter-spacing: 0.15em;
  }

  .lobby__hero {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    height: 220px;
  }

  .hero-card-stack .card {
    position: absolute;
    transition: transform 0.3s;
  }
  .hero-card-stack .card:nth-child(1) { transform: translate(-90px, 0) rotate(-14deg); z-index: 1; }
  .hero-card-stack .card:nth-child(2) { transform: translate(-30px, -20px) rotate(-4deg); z-index: 2; }
  .hero-card-stack .card:nth-child(3) { transform: translate(40px, -10px) rotate(6deg); z-index: 3; }
  .hero-card-stack .card:nth-child(4) { transform: translate(100px, 8px) rotate(16deg); z-index: 4; }

  .hero-card-stack { position: relative; width: 100%; height: 100%; }

  .lobby__cta {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 8px 20px;
  }
  .lobby__cta .btn { width: 100%; padding: 18px; font-size: 15px; }

  .lobby__footer {
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    border-top: 1px solid var(--line-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .lobby__footer div { padding: 4px 8px; cursor: pointer; }

  .lobby__stats {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--line-dim);
    border-radius: 4px;
    padding: 12px;
    display: flex;
    justify-content: space-around;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin: 0 8px;
  }
  .stat-block {
    text-align: center;
  }
  .stat-block__value {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan-glow);
    line-height: 1;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="cyber-grid"></div>
  <div class="scanlines"></div>

  <div class="lobby">

    <div class="lobby__logo">
      <div class="lobby__logo__badge">// SYSTEM ONLINE</div>
      <div class="lobby__logo__title">RANDOM<br/>BATTLE</div>
      <div class="lobby__logo__sub">A U T O ・ D R A F T ・ A R E N A</div>
      <div class="lobby__logo__version">v0.1 MVP</div>
    </div>

    <div class="lobby__hero">
      <div class="hero-card-stack">
        <div class="card" data-level="S"><div class="card__level">S</div><div class="card__icon">👤</div><div class="card__power">1</div><div class="card__name">GRUNT</div></div>
        <div class="card" data-level="A"><div class="card__level">A</div><div class="card__icon">🥷</div><div class="card__power">3</div><div class="card__name">RUNNER</div></div>
        <div class="card" data-level="B"><div class="card__level">B</div><div class="card__icon">🤖</div><div class="card__power">4</div><div class="card__name">SYNTH</div></div>
        <div class="card" data-level="C"><div class="card__level">C</div><div class="card__icon">👹</div><div class="card__power">8</div><div class="card__name">DAEMON</div></div>
      </div>
    </div>

    <div class="lobby__stats">
      <div class="stat-block">
        <div class="stat-block__value">3</div>
        <div>CHAMPIONS</div>
      </div>
      <div class="stat-block">
        <div class="stat-block__value">12</div>
        <div>MATCHES</div>
      </div>
      <div class="stat-block">
        <div class="stat-block__value">67%</div>
        <div>WIN RATE</div>
      </div>
    </div>

    <div class="lobby__cta">
      <button class="btn btn-primary">▶ NEW TOURNAMENT</button>
      <button class="btn btn-ghost">CONTINUE (R3/7)</button>
    </div>

    <div class="lobby__footer">
      <div>RULES</div>
      <div>STATS</div>
      <div>SETTINGS</div>
    </div>

  </div>
</div>

</body>
</html>
